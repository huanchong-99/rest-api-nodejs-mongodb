version: "3.8"

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017/rest-api-nodejs-mongodb
      - JWT_SECRET=your-jwt-secret-change-in-production
      - JWT_TIMEOUT_DURATION=2 hours
      - EMAIL_SMTP_HOST=smtp.example.com
      - EMAIL_SMTP_PORT=587
      - EMAIL_SMTP_USERNAME=your-email@example.com
      - EMAIL_SMTP_PASSWORD=your-email-password
      - EMAIL_SMTP_SECURE=false
      - PORT=3000
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
